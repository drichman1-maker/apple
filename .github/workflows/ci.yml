name: CI

on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  build-theresmac:
    name: Build theresmac frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # --ignore-scripts: the monorepo root installs workspace packages (including
      # packages/db whose postinstall runs `prisma generate`); the Vite build
      # doesn't need them and some lack committed package.json / schemas.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npx vite build

  build-aggregator-dashboard:
    name: Build admin dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aggregator-dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: aggregator-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
