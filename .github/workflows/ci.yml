name: CI

on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  # NOTE: theresmac frontend build is not yet wired up to CI. Its package.json
  # was clobbered when the repo was converted to a monorepo root, and the
  # frontend deps (vite, react, tailwind) aren't declared anywhere. Restoring
  # it as a proper workspace (or separate app/) is tracked as a follow-up.
  build-aggregator-dashboard:
    name: Build admin dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aggregator-dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: aggregator-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
