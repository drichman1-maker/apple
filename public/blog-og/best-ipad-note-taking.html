<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f172a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      position: relative;
      overflow: hidden;
      padding: 60px;
    }
    .glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.25) 0%, transparent 70%);
      top: -200px;
      right: -200px;
      border-radius: 50%;
    }
    .category {
      font-size: 18px;
      color: #3b82f6;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 20px;
      font-weight: 600;
    }
    .title {
      font-size: 56px;
      font-weight: 800;
      color: #fafafa;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 30px;
      max-width: 1000px;
    }
    .description {
      font-size: 28px;
      color: #a3a3a3;
      text-align: center;
      max-width: 900px;
      line-height: 1.4;
    }
    .brand {
      position: absolute;
      bottom: 40px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .brand-text {
      font-size: 24px;
      font-weight: 700;
      color: #fafafa;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="category">Buying Guide</div>
  <div class="title">Best iPad for Note Taking 2026</div>
  <div class="description">Students & Professionals Guide</div>
  <div class="brand">
    <div class="brand-icon">📱</div>
    <div class="brand-text">MacTrackr</div>
  </div>
</body>
</html>
